<!DOCTYPE html>
<html lang="es" data-bs-theme="auto">
	<!-- HEADERS [INICIO] -->
	<head>

		<title>Marcelo Escobar - portafolio</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="./assets/images/logo_canal_rounded.webp" />
		<script type="module" src="app/kernel.mjs"></script>
		<link rel="stylesheet" href="assets/css/MYTstrap.css" />
		<link rel="stylesheet" href="assets/css/index.css" />
	</head>
	<!-- HEADERS [FIN] -->
	<body>
		<!-- PANTALLA DE CARGA [INICIO] -->
		<loader>
			<div class="loader-content">
				<img class="loader-img" src="assets/images/logo_canal_rounded.webp" alt="TheMarceloYT logo" />

				<p id="loader-text">...</p>
			</div>
		</loader>

				<!-- NAVBAR TOGGLER [INICIO] -->
				<button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#navbar-content">

						class="navbar-toggler-icon"

					/>

				<!-- NAVBAR TOGGLER [FIN] -->

					<div class="offcanvas-header">

							<img loading="lazy" src="/assets/icons/btn_close.webp" />

						<li class="nav-item mx-lg-4">

							<dropdown>

									<img id="dropdown-lang-img" src="assets/icons/lang_icon.webp" alt="Idioma" />
								</button>
								<div class="dropdown-menu" id="dropdown-idioma">
									<!-- Aquí los idiomas de la app -->

									<!-- BTN ES [INICIO] -->
									<button data-lang-selected="es">
										<div class="d-flex align-items-center">
											<img class="btn-icon-img" src="assets/icons/lang/spain_flag_icon.webp" alt="Bandera ES" />
											<div class="ml-1" data-lang="langBtnEs">...</div>
										</div>
									</button>
									<!-- BTN ES [FIN] -->

									<!-- BTN EN [INICIO] -->
									<button data-lang-selected="en">
										<div class="d-flex align-items-center">

										</div>
									</button>
									<!-- BTN EN [FIN] -->
								</div>
							</dropdown>

								<button class="dropdown-toggle">

								<div class="dropdown-menu" id="dropdown-theme">

									<!-- <button data-lang="themeAuto" data-theme="auto">...</button> -->

									<!-- BTN LIGHT THEME [INICIO] -->
									<button data-theme="light">

											<img
												class="btn-icon-img rounded bg-red"
												src="assets/icons/themes/light_theme_icon.webp"
												alt="Tema claro"
											/>
											<div class="ml-1" data-lang="langThemeLight">...</div>
										</div>
									</button>
									<!-- BTN LIGHT THEME [FIN] -->

									<!-- BTN DARK THEME [INICIO] -->
									<button data-theme="dark">
										<div class="d-flex align-items-center">
											<img
												class="btn-icon-img rounded bg-red"
												src="assets/icons/themes/dark_theme_icon.webp"
												alt="Tema oscuro"
											/>
											<div class="ml-1" data-lang="langThemeDark">...</div>
										</div>
									</button>
									<!-- BTN DARK THEME [FIN] -->
								</div>

								/>
							</a>
							<!-- YT link [FIN] -->

							<!-- GITHUB link [INICIO] -->
							<div class="d-none" data-tooltip="github">Github</div>
							<a class="p-0 mx-1" href="https://github.com/TheMarceloYT" tooltip-target="github" target="_blank">
								<img loading="lazy" class="github-icon" src="/assets/icons/github_icon.webp" alt="Github logo" />
							</a>
							<!-- GITHUB link [FIN] -->

							<!-- LINKEDIN link [INICIO] -->
							<div class="d-none" data-tooltip="linkedin">Linkedin</div>
							<a
								class="p-0 mx-1"
								href="https://www.linkedin.com/in/marceloescobarv"
								tooltip-target="linkedin"
								target="_blank"
							>
								<img loading="lazy" class="linkedin-icon" src="/assets/icons/linkedin_icon.webp" alt="Linkedin logo" />
							</a>
							<!-- LINKEDIN link [FIN] -->

							<!-- TWITCH link [INICIO] -->
							<div class="d-none" data-tooltip="twitch">Twitch</div>
							<a class="p-0 mx-1" href="https://www.twitch.tv/themarcelotwitch" tooltip-target="twitch" target="_blank">
								<img loading="lazy" class="twitch-icon" src="/assets/icons/twitch_icon.webp" alt="Twitch logo" />
							</a>
							<!-- TWITCH link [FIN] -->

							<!-- DISCORD link [INICIO] -->
							<div class="d-none" data-tooltip="discord">Discord</div>
							<a class="p-0 mx-1" href="https://discord.com/invite/MDnuduJ" tooltip-target="discord" target="_blank">
								<img loading="lazy" class="discord-icon" src="/assets/icons/discord_icon.webp" alt="Discord logo" />
							</a>
							<!-- DISCORD link [FIN] -->
						</div>

							<p data-lang="langOffcanvasFooterText">...</p>
							<a class="link link-white" href="https://github.com/TheMarceloYT" target="_blank">TheMarceloYT</a>
						</div>

				<div class="modal-body">...</div>
				<div class="modal-footer">...</div>

				<a class="link link-white" href="https://github.com/TheMarceloYT" target="_blank">TheMarceloYT</a>
